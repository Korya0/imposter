name: imposter
description: "A thrilling local multiplayer social deduction game."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # State Management
  get_it: ^9.2.1
  flutter_bloc: ^9.1.1
  # Routing
  go_router: ^17.2.1
  # UI
  flutter_svg: ^2.2.4
  flutter_animate: ^4.5.2
  toastification: ^3.1.0
  # Localization
  intl: ^0.20.2
  # Debugging
  device_preview: ^1.3.1
  lottie: ^3.3.3
  dotlottie_loader: ^0.0.6
  skeletonizer: ^2.1.3
  audioplayers: ^6.6.0


dev_dependencies:
  # Splash Screen
  flutter_native_splash: ^2.4.7
  # App Icons
  flutter_launcher_icons: ^0.14.4

  flutter_test:
    sdk: flutter
  
  very_good_analysis: ^10.2.0

flutter:
  uses-material-design: true

  assets:
    - assets/svgs/
    - assets/svgs/places.svg
    - assets/svgs/food.svg
    - assets/svgs/professions.svg
    - assets/svgs/animals.svg
    - assets/svgs/things.svg
    - assets/svgs/trophy.svg
    - assets/images/
    - assets/data/
    - assets/audio/

  fonts:
    - family: ArefRuqaa
      fonts:
        - asset: assets/font/ArefRuqaa/ArefRuqaa-Regular.ttf
        - asset: assets/font/ArefRuqaa/ArefRuqaa-Bold.ttf
          weight: 700
    - family: Lateef
      fonts:
        - asset: assets/font/lateef/Lateef-ExtraLight.ttf
          weight: 200
        - asset: assets/font/lateef/Lateef-Light.ttf
          weight: 300
        - asset: assets/font/lateef/Lateef-Regular.ttf
          weight: 400
        - asset: assets/font/lateef/Lateef-Medium.ttf
          weight: 500
        - asset: assets/font/lateef/Lateef-SemiBold.ttf
          weight: 600
        - asset: assets/font/lateef/Lateef-Bold.ttf
          weight: 700
        - asset: assets/font/lateef/Lateef-ExtraBold.ttf
          weight: 800

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/logo_splash_icon.png"
  web:
    generate: true
    image_path: "assets/images/logo_splash_icon.png"
    background_color: "#000000"
    theme_color: "#000000"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/logo_splash_icon.png"

flutter_native_splash:
  color: "#000000"
  image: "assets/images/logo_splash_icon.png"
  android_12:
    image: "assets/images/logo_splash_icon.png"
    color: "#000000"
  web: true
  fullscreen: false


