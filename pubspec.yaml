name: imposter
description: "A thrilling local multiplayer social deduction game."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # State Management
  get_it: ^9.2.1
  flutter_bloc: ^9.1.1
  # Routing
  go_router: ^17.2.1
  # UI
  flutter_svg: ^2.2.4
  flutter_animate: ^4.5.2
  # Localization
  intl: ^0.20.2
  # Debugging
  device_preview: ^1.3.1


dev_dependencies:
  # Splash Screen
  flutter_native_splash: ^2.4.7
  # App Icons
  flutter_launcher_icons: ^0.14.4

  flutter_test:
    sdk: flutter
  
  very_good_analysis: ^10.2.0

flutter:
  uses-material-design: true

